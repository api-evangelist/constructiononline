    description: >-
      REST API for the ConstructionOnline platform that lets approved
      Business and Enterprise customers programmatically read and write
      projects, contacts, schedules, daily logs, change orders, budgets,
      and time-tracking records. Used to integrate ConstructionOnline with
      Zapier, HubSpot, Salesforce, custom dashboards, and ERP systems.
      Limited to 500 requests per hour per account.
