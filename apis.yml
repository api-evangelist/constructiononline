description: >-
  ConstructionOnline is UDA Technologies' cloud construction project
  management platform covering estimating, scheduling, budgets, change
  orders, daily logs, file sharing, and client and subcontractor
  collaboration. UDA exposes the platform through a documented REST API
  available to ConstructionOnline Business and Enterprise customers, with
  read and write access for projects, contacts, schedules, and financials.
  Access is gated by an application process (api@uda1.com), authenticated
  with company-issued credentials, and rate-limited to 500 requests per
  hour per account.
